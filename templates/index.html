<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel Data App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 800px;">
    <h1 class="mb-4">Excel Data App</h1>

    <!-- Upload Form -->
    <div class="card mb-4">
      <div class="card-header fw-semibold">Step 1: Upload Excel File</div>
      <div class="card-body">
        <form
          hx-post="/upload"
          hx-encoding="multipart/form-data"
          hx-target="#sheet-section"
          hx-swap="innerHTML"
        >
          <div class="mb-3">
            <input class="form-control" type="file" name="file" accept=".xlsx,.xls" required>
          </div>
          <button type="submit" class="btn btn-primary">Upload</button>
        </form>
      </div>
    </div>

    <!-- Sheet Selector (filled by HTMX) -->
    <div id="sheet-section"></div>

    <!-- Sheet Info (filled by HTMX) -->
    <div id="info-section"></div>
  </div>
</body>
</html>
