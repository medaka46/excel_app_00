<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel Data App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      color: #0f0 !important;
      font-size: 80% !important;
    }
    .card-header, .card-body, .card-body label,
    .card-body .form-text, .card-body code,
    .form-check-label {
      color: #0f0 !important;
    }
    input[type="file"]::file-selector-button {
      color: #0f0 !important;
      background-color: transparent;
      border: 1px solid #0f0;
    }
    input[type="file"] {
      color: #0f0 !important;
    }
  </style>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-bs-theme', theme);
    })();
  </script>
</head>
<body>
  <div class="container py-5" style="max-width: 2000px;">
  <!-- <div class="container py-5" style="max-width: 800px;"> -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="mb-0">Excel Data App</h1>
      <button id="theme-toggle" class="btn btn-outline-secondary" onclick="toggleTheme()">
        <span id="theme-icon"></span>
      </button>
    </div>

    <!-- Step 1: Upload and Alternative side by side -->
    <div class="row g-4 mb-4">
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header fw-semibold">Step 1: Upload Excel File</div>
          <div class="card-body">
            <form
              hx-post="/upload"
              hx-encoding="multipart/form-data"
              hx-target="#sheet-section"
              hx-swap="innerHTML"
            >
              <div class="mb-3">
                <input class="form-control" type="file" name="file" accept=".xlsx,.xls" required>
              </div>
              <button type="submit" class="btn btn-primary">Upload</button>
            </form>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header fw-semibold">Step 1 (Alternative): Load Included Excel File</div>
          <div class="card-body">
            <button
              class="btn btn-outline-primary"
              hx-get="/load-sample"
              hx-target="#sheet-section"
              hx-swap="innerHTML"
            >
              Load Sample-Project-data-2025-end-004.xlsx
            </button>
            <div class="form-text mt-2">
              This loads the Excel file already in <code>excel_app_00/</code> without uploading.
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sheet Selector (filled by HTMX) -->
    <div id="sheet-section"></div>

    <!-- Progress bar (shown while loading sheet info) -->
    <div id="sheet-progress-wrap" class="mb-3 d-none">
      <div class="d-flex justify-content-between mb-1">
        <small>Loading columns…</small>
        <small id="sheet-progress-pct">0%</small>
      </div>
      <div class="progress" style="height: 6px;">
        <div id="sheet-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated"
             role="progressbar" style="width: 0%"></div>
      </div>
    </div>

    <!-- Sheet Info (filled by HTMX) -->
    <div id="info-section"></div>
  </div>
  <script>
    function updateValueField(colSelect, wrapId, uniqueVals) {
      var wrap = document.getElementById(wrapId);
      if (!wrap) return;
      var col = colSelect.value;
      var label = wrap.querySelector('label');
      var vals = uniqueVals[col];
      wrap.innerHTML = '';
      if (label) wrap.appendChild(label);
      if (vals) {
        var sel = document.createElement('select');
        sel.className = 'form-select';
        sel.name = 'value';
        sel.required = true;
        vals.forEach(function (v) {
          var opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          sel.appendChild(opt);
        });
        wrap.appendChild(sel);
      } else {
        var inp = document.createElement('input');
        inp.className = 'form-control';
        inp.type = 'text';
        inp.name = 'value';
        inp.required = true;
        wrap.appendChild(inp);
      }
    }

    function makeProgress(wrapId, barId, pctId) {
      var timer = null, pct = 0;
      function setBar(p) {
        var bar = document.getElementById(barId);
        var lbl = document.getElementById(pctId);
        if (bar) bar.style.width = p.toFixed(0) + '%';
        if (lbl) lbl.textContent = p.toFixed(0) + '%';
      }
      return {
        start: function () {
          pct = 0;
          var wrap = document.getElementById(wrapId);
          if (wrap) wrap.classList.remove('d-none');
          setBar(0);
          timer = setInterval(function () {
            pct += (90 - pct) * 0.08;
            setBar(pct);
          }, 120);
        },
        finish: function () {
          clearInterval(timer);
          setBar(100);
          setTimeout(function () {
            var wrap = document.getElementById(wrapId);
            if (wrap) wrap.classList.add('d-none');
            setBar(0);
          }, 400);
        }
      };
    }

    var sheetProgress  = makeProgress('sheet-progress-wrap',  'sheet-progress-bar',  'sheet-progress-pct');
    var filterProgress = makeProgress('filter-progress-wrap', 'filter-progress-bar', 'filter-progress-pct');

    var _savedDotX = null, _savedDotY = null;

    document.body.addEventListener('htmx:beforeRequest', function (e) {
      var id = e.detail && e.detail.target && e.detail.target.id;
      if (id === 'info-section')    sheetProgress.start();
      if (id === 'results-section') {
        filterProgress.start();
        var dx = document.getElementById('dot-x');
        var dy = document.getElementById('dot-y');
        if (dx) _savedDotX = dx.value;
        if (dy) _savedDotY = dy.value;
      }
    });
    document.body.addEventListener('htmx:afterRequest', function (e) {
      var id = e.detail && e.detail.target && e.detail.target.id;
      if (id === 'info-section')    sheetProgress.finish();
      if (id === 'results-section') filterProgress.finish();
    });
    document.body.addEventListener('htmx:afterSettle', function (e) {
      var id = e.detail && e.detail.target && e.detail.target.id;
      if (id === 'results-section') {
        var dx = document.getElementById('dot-x');
        var dy = document.getElementById('dot-y');
        if (dx && _savedDotX) {
          dx.value = _savedDotX;
        }
        if (dy && _savedDotY) {
          dy.value = _savedDotY;
        }
        if (typeof drawDotPlot === 'function') drawDotPlot();
      }
    });

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-bs-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-bs-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-icon').textContent = next === 'dark' ? '\u2600\ufe0f' : '\ud83c\udf19';
    }
    (function() {
      const saved = localStorage.getItem('theme') || 'light';
      document.getElementById('theme-icon').textContent = saved === 'dark' ? '\u2600\ufe0f' : '\ud83c\udf19';
    })();
  </script>
</body>
</html>
