<div class="card mb-4">
  <div class="card-header fw-semibold">Sheet Info: {{ sheet_name }}</div>
  <div class="card-body">
    <p class="mb-2"><strong>Rows:</strong> {{ row_count }}</p>
    <p class="mb-2"><strong>Columns ({{ columns | length }}):</strong></p>
    <div class="row row-cols-5 g-1 mb-3">
      {% for col in columns %}
      <div class="col" style="color: #0f0 !important;">{{ loop.index }}. {{ col }}</div>
      {% endfor %}
    </div>
  </div>
</div>

<!-- Filter Form -->
<div class="card mb-4">
  <div class="card-header fw-semibold">Filter Rows</div>
  <div class="card-body">
    <form hx-post="/filter" hx-target="#results-section" hx-swap="innerHTML">
      <input type="hidden" name="saved_path" value="{{ saved_path }}">
      <input type="hidden" name="sheet_name" value="{{ sheet_name }}">
      <input type="hidden" name="filters" value="[]">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label mb-1">Column</label>
          <select class="form-select" name="col">
            {% for col in columns %}
            <option value="{{ col }}">{{ col }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label mb-1">Operator</label>
          <select class="form-select" name="operator">
            <option value="=">=</option>
            <option value="!=">!=</option>
            <option value="contains">contains</option>
            <option value=">">&gt;</option>
            <option value=">=">&gt;=</option>
            <option value="<">&lt;</option>
            <option value="<=">&lt;=</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label mb-1">Value</label>
          <input class="form-control" type="text" name="value" required>
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-primary w-100">Apply</button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- Progress bar (shown while filtering) -->
<div id="filter-progress-wrap" class="mb-3 d-none">
  <div class="d-flex justify-content-between mb-1">
    <small>Filtering data…</small>
    <small id="filter-progress-pct">0%</small>
  </div>
  <div class="progress" style="height: 6px;">
    <div id="filter-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated"
         role="progressbar" style="width: 0%"></div>
  </div>
</div>

<div id="results-section"></div>
